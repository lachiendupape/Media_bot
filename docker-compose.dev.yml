name: media_bot_dev

services:
  media-bot-dev:
    build: .
    container_name: media-bot-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - APP_VERSION=dev
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${DEV_OLLAMA_MODEL:-qwen2.5:7b}
      - DATA_DIR=/app/data-dev
      - CONVERSATION_MEMORY_ENABLED=${CONVERSATION_MEMORY_ENABLED:-true}
      - CONVERSATION_MEMORY_MAX_TURNS=${CONVERSATION_MEMORY_MAX_TURNS:-20}
      - CONVERSATION_MEMORY_TTL_HOURS=${CONVERSATION_MEMORY_TTL_HOURS:-24}
      - CONVERSATION_MEMORY_CLEANUP_INTERVAL=${CONVERSATION_MEMORY_CLEANUP_INTERVAL:-100}
      - CONVERSATION_MEMORY_PURGE_ON_LOGOUT=${CONVERSATION_MEMORY_PURGE_ON_LOGOUT:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cache-data-dev:/app/data-dev
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  media-bot-cleanup-dev:
    build: .
    container_name: media-bot-cleanup-dev
    restart: unless-stopped
    command: ["python", "cleanup_service.py"]
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - APP_VERSION=dev
      - DATA_DIR=/app/data-dev
      - CLEANUP_ENABLED=${CLEANUP_ENABLED:-false}
      - CLEANUP_CHECK_INTERVAL_DAYS=${CLEANUP_CHECK_INTERVAL_DAYS:-7}
      - CLEANUP_MAX_AGE_DAYS=${CLEANUP_MAX_AGE_DAYS:-28}
      - CLEANUP_SCHEDULE_HOUR=${CLEANUP_SCHEDULE_HOUR:-3}
      - CLEANUP_BACKLOG_WARN_DAYS=${CLEANUP_BACKLOG_WARN_DAYS:-3}
      - CLEANUP_MIN_WATCHED_EPISODES=${CLEANUP_MIN_WATCHED_EPISODES:-1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - cache-data-dev:/app/data-dev

volumes:
  cache-data-dev:
